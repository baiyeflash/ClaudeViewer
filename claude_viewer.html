<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 数据查看器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
  --primary:#D97757; --primary-dark:#C4653A; --primary-light:#F5E6D3;
  --sand:#E8DDD3; --bg:#FAF8F5; --surface:#FFFFFF;
  --t1:#1A1A1A; --t2:#4A4543; --t3:#9C9590;
  --shadow:rgba(193,165,140,0.14); --border:#E4DDD6;
  --fd:Georgia,'Lora',serif; --fb:system-ui,-apple-system,'Segoe UI',sans-serif;
  --fm:'JetBrains Mono','Fira Code',monospace;
  --r8:8px; --r12:12px; --r16:16px; --r24:24px; --rfull:9999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:14px;line-height:1.65}

/* ── UPLOAD ── */
#upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;padding:32px;
  background:radial-gradient(ellipse at 60% 40%,#f5e6d3 0%,var(--bg) 70%)}
.u-logo{font-size:52px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.u-title{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:-0.01em}
.u-sub{color:var(--t3);font-size:13px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r24);padding:40px 52px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);
  box-shadow:0 4px 24px var(--shadow);max-width:460px;width:100%}
.drop-zone:hover,.drop-zone.over{border-color:var(--primary);background:#fdf6f0;
  box-shadow:0 8px 32px rgba(217,119,87,.12)}
.drop-icon{font-size:38px;margin-bottom:12px}
.drop-label{color:var(--t2);font-size:14px;margin-bottom:4px}
.drop-hint{color:var(--t3);font-size:12px;margin-bottom:20px}
code.tag{background:var(--primary-light);color:var(--primary-dark);
  padding:1px 7px;border-radius:4px;font-family:var(--fm);font-size:12px}
.pick-btn{display:inline-block;background:var(--primary);color:#fff;
  padding:10px 28px;border-radius:var(--rfull);cursor:pointer;font-size:14px;
  font-weight:500;border:none;transition:background .15s;
  box-shadow:0 2px 8px rgba(217,119,87,.3)}
.pick-btn:hover{background:var(--primary-dark)}
#file-input{display:none}
.u-note{font-size:12px;color:var(--t3);max-width:380px;text-align:center;line-height:1.7}

/* ── MAIN LAYOUT ── */
#main-screen{display:none;flex-direction:row;height:100%}
#sidebar{width:280px;min-width:220px;max-width:320px;flex-shrink:0;
  display:flex;flex-direction:column;height:100%;
  border-right:1px solid var(--border);background:var(--surface)}
#sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sh-title{font-family:var(--fd);font-size:17px;font-weight:700}
.sh-sub{font-size:11px;color:var(--t3);margin-top:2px}
.ghost-btn{background:none;border:1px solid var(--border);border-radius:var(--r8);
  padding:5px 12px;color:var(--t2);cursor:pointer;font-size:11px;transition:all .15s}
.ghost-btn:hover{border-color:var(--primary);color:var(--primary)}

/* Tabs */
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:12px;cursor:pointer;
  color:var(--t3);border-bottom:2px solid transparent;transition:all .15s;
  font-weight:500}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Sidebar search */
#sidebar-search-wrap{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-search{width:100%;padding:7px 10px;border:1px solid var(--border);
  border-radius:var(--r8);background:var(--bg);font-family:var(--fb);
  font-size:13px;color:var(--t1);outline:none;transition:border-color .15s}
#sidebar-search:focus{border-color:var(--primary)}

/* Sidebar scroll */
#sidebar-scroll{flex:1;overflow-y:auto;padding:10px 10px}
#sidebar-scroll::-webkit-scrollbar{width:4px}
#sidebar-scroll::-webkit-scrollbar-thumb{background:var(--sand);border-radius:3px}

/* Cards */
.s-card{border-radius:var(--r12);padding:11px 13px;margin-bottom:7px;cursor:pointer;
  transition:all .15s;border:1px solid transparent;box-shadow:0 1px 3px var(--shadow)}
.s-card:hover{border-color:var(--primary-light);transform:translateY(-1px);
  box-shadow:0 3px 12px var(--shadow)}
.s-card.active{border-color:var(--primary);background:var(--primary-light)}
.s-card.no-cursor{cursor:default}
.s-card.no-cursor:hover{transform:none;border-color:transparent}
.card-name{font-weight:500;font-size:13px;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{background:var(--primary-light);color:var(--primary-dark);
  padding:2px 7px;border-radius:var(--rfull);font-size:11px;font-weight:500}
.badge.green{background:#e8f4eb;color:#4a7a52}
.badge.gray{background:var(--sand);color:var(--t2)}
.card-time{font-size:11px;color:var(--t3)}
.empty-hint{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px}

/* Static panels (Projects/Memories/Account) */
#content-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
#static-panel{flex:1;overflow-y:auto;padding:24px;display:none}
#static-panel::-webkit-scrollbar{width:5px}
#static-panel::-webkit-scrollbar-thumb{background:var(--sand);border-radius:3px}
.panel-title{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:20px}
.section-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r16);padding:18px 20px;margin-bottom:14px;
  box-shadow:0 1px 4px var(--shadow)}
.sc-title{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.sc-body{font-size:13px;color:var(--t2);line-height:1.7}
.sc-body pre{background:var(--bg);border:1px solid var(--border);padding:10px 14px;
  border-radius:var(--r8);overflow-x:auto;font-family:var(--fm);font-size:12px;
  margin-top:8px;white-space:pre-wrap}
.sc-body code{font-family:var(--fm);font-size:12px;background:var(--primary-light);
  padding:1px 5px;border-radius:3px;color:var(--primary-dark)}
.sc-kv{display:grid;grid-template-columns:auto 1fr;gap:5px 16px;font-size:13px}
.sc-k{color:var(--t3);white-space:nowrap}
.sc-v{color:var(--t1)}
.mem-text{font-size:13px;color:var(--t2);line-height:1.75;white-space:pre-wrap}
.mem-md{font-size:13px;color:var(--t2);line-height:1.8}
.mem-md h1,.mem-md h2,.mem-md h3,.mem-md h4{font-family:var(--fd);margin:16px 0 6px;color:var(--t1)}
.mem-md h1{font-size:17px;border-bottom:1px solid var(--sand);padding-bottom:5px}
.mem-md h2{font-size:15px}.mem-md h3{font-size:14px}
.mem-md p{margin:5px 0}.mem-md ul,.mem-md ol{padding-left:18px;margin:5px 0}
.mem-md li{margin:3px 0}.mem-md strong{font-weight:600;color:var(--t1)}
.mem-md hr{border:none;border-top:1px solid var(--sand);margin:14px 0}
.mem-md code{font-family:var(--fm);font-size:12px;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px}
.mem-md pre{background:#1b1f27;color:#abb2bf;padding:11px;border-radius:var(--r8);font-size:12px;font-family:var(--fm);overflow-x:auto;margin:7px 0}
.mem-md blockquote{border-left:3px solid var(--primary);padding:3px 11px;color:var(--t2);margin:5px 0;font-style:italic}
hr.sc-div{border:none;border-top:1px solid var(--border);margin:14px 0}

/* ── DETAIL VIEW ── */
#detail-view{display:none;flex-direction:column;flex:1;height:100%;overflow:hidden}
.detail-header{padding:11px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  box-shadow:0 1px 4px var(--shadow)}
#back-btn{background:none;border:1px solid var(--border);border-radius:var(--r8);
  padding:6px 12px;color:var(--t2);cursor:pointer;font-size:12px;
  flex-shrink:0;transition:all .15s}
#back-btn:hover{border-color:var(--primary);color:var(--primary)}
#detail-title{font-family:var(--fd);font-size:14px;font-weight:600;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.export-btns{display:flex;gap:6px;flex-shrink:0}
.exp-btn{padding:6px 12px;border-radius:var(--r8);font-size:12px;cursor:pointer;
  transition:all .15s;border:1px solid var(--border);color:var(--t2);background:var(--surface)}
.exp-btn:hover{border-color:var(--primary);color:var(--primary)}
.exp-btn.pdf{background:var(--primary);color:#fff;border-color:var(--primary)}
.exp-btn.pdf:hover{background:var(--primary-dark);border-color:var(--primary-dark)}

/* Search bar */
.search-bar{padding:8px 14px;background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;flex-shrink:0}
#search-input{flex:1;padding:7px 10px;border:1px solid var(--border);
  border-radius:var(--r8);background:var(--surface);font-family:var(--fb);
  font-size:13px;color:var(--t1);outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--primary)}
.sb-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--r8);
  padding:7px 13px;font-size:12px;cursor:pointer;transition:background .15s}
.sb-btn:hover{background:var(--primary-dark)}
.sb-nav{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);
  padding:7px 10px;color:var(--t2);cursor:pointer;font-size:12px;transition:all .15s}
.sb-nav:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.sb-nav:disabled{opacity:.35;cursor:not-allowed}
#search-count{font-size:12px;color:var(--t3);white-space:nowrap;min-width:46px}

/* Virtual scroll */
.messages-vp{flex:1;overflow-y:scroll;position:relative;background:var(--bg)}
.messages-vp::-webkit-scrollbar{width:5px}
.messages-vp::-webkit-scrollbar-thumb{background:var(--sand);border-radius:3px}
#vc{position:relative}

/* Messages */
.msg-wrap{padding:5px 14px;display:flex}
.msg-wrap.human{justify-content:flex-end}
.msg-wrap.assistant{justify-content:flex-start}
.msg-inner{max-width:82%}
.msg-meta{font-size:11px;color:var(--t3);margin-bottom:4px;
  display:flex;align-items:center;gap:7px}
.msg-wrap.human .msg-meta{justify-content:flex-end}
.sender-label{font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;font-size:10px}
.sender-label.human{color:var(--primary-dark)}
.sender-label.assistant{color:#6B8F71}

/* Thinking */
.thinking-block{margin-bottom:6px;border-radius:var(--r12);
  border:1px solid #ddd8d2;background:#f5f1ec;overflow:hidden}
.thinking-toggle{display:flex;align-items:center;gap:7px;padding:7px 11px;
  cursor:pointer;font-size:11px;color:var(--t3);user-select:none;transition:background .12s}
.thinking-toggle:hover{background:#ede9e3}
.ti{font-size:9px;transition:transform .18s;display:inline-block}
.thinking-toggle.open .ti{transform:rotate(90deg)}
.thinking-sum{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.thinking-body{display:none;padding:9px 12px;border-top:1px solid #ddd8d2;
  background:#f9f6f2;font-size:12px;color:var(--t2);line-height:1.65;
  white-space:pre-wrap;font-style:italic;max-height:300px;overflow-y:auto}
.thinking-body.open{display:block}

/* Bubbles */
.bubble{padding:10px 14px;border-radius:var(--r16);font-size:14px;
  line-height:1.7;word-break:break-word;overflow-wrap:anywhere}
.bubble.human{background:var(--primary-light);color:var(--t1);border-bottom-right-radius:4px}
.bubble.assistant{background:var(--surface);color:var(--t1);border:1px solid var(--border);
  border-bottom-left-radius:4px;box-shadow:0 1px 4px var(--shadow)}
.bubble h1,.bubble h2,.bubble h3,.bubble h4{font-family:var(--fd);margin:12px 0 5px;color:var(--t1);line-height:1.3}
.bubble h1{font-size:17px}.bubble h2{font-size:16px}.bubble h3{font-size:15px}.bubble h4{font-size:14px}
.bubble p{margin:4px 0}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0}
.bubble li{margin:2px 0}
.bubble code{font-family:var(--fm);font-size:12px;background:rgba(0,0,0,.06);
  padding:1px 5px;border-radius:3px}
.bubble pre{background:#1b1f27;color:#abb2bf;padding:11px 13px;
  border-radius:var(--r8);overflow-x:auto;margin:7px 0;
  font-size:12px;font-family:var(--fm);line-height:1.55}
.bubble pre code{background:none;color:inherit;padding:0}
.bubble table{border-collapse:collapse;width:100%;margin:7px 0;font-size:13px}
.bubble th,.bubble td{border:1px solid var(--sand);padding:5px 9px}
.bubble th{background:var(--primary-light);font-weight:600}
.bubble blockquote{border-left:3px solid var(--primary);padding:3px 11px;
  color:var(--t2);margin:5px 0;font-style:italic}
.bubble a{color:var(--primary-dark)}
.bubble hr{border:none;border-top:1px solid var(--sand);margin:8px 0}
.bubble strong{font-weight:600}

/* Search highlights */
mark.hl{background:#ffe566;color:var(--t1);border-radius:2px;padding:0 1px}
mark.hl.cur{background:var(--primary);color:#fff}

/* Loading */
#loading{display:none;position:fixed;inset:0;background:rgba(250,248,245,.9);
  z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--sand);border-top-color:var(--primary);
  border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:13px;color:var(--t2)}

/* Print */
@media print{
  #sidebar,#sidebar-search-wrap,#tabs,#sidebar-header,
  .search-bar,.detail-header,#loading,#upload-screen,#main-screen{display:none!important}
  #print-area{display:block!important}
  body{overflow:auto;height:auto}
}
#print-area{display:none}
</style>
</head>
<body>
<div id="upload-screen">
  <div class="u-logo">🗂️</div>
  <div style="text-align:center">
    <div class="u-title">Claude 数据查看器</div>
    <div class="u-sub" style="margin-top:5px">数据完全本地处理 · 不上传任何内容</div>
  </div>
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">📦</div>
    <div class="drop-label">拖放 <code class="tag">.zip</code> 导出包或 <code class="tag">conversations.json</code></div>
    <div class="drop-hint">支持 ZIP 整包 / JSON / Markdown (.md) 记忆文件</div>
    <label for="file-input" class="pick-btn" id="pick-label">选择文件</label>
    <input type="file" id="file-input" accept=".json,.zip,.md,.markdown" multiple>
  </div>
  <div class="u-note">支持解析：对话记录 · 项目信息 · 记忆数据 · 账户信息</div>
</div>

<div id="main-screen">
  <div id="sidebar">
    <div id="sidebar-header">
      <div>
        <div class="sh-title">Claude 数据</div>
        <div class="sh-sub" id="sh-sub">—</div>
      </div>
      <button class="ghost-btn" id="reset-btn">↩ 重新导入</button>
    </div>
    <div id="tabs">
      <div class="tab active" data-tab="convs">💬 对话</div>
      <div class="tab" data-tab="projects">📁 项目</div>
      <div class="tab" data-tab="memories">🧠 记忆</div>
      <div class="tab" data-tab="account">👤 账户</div>
    </div>
    <div id="sidebar-search-wrap">
      <input id="sidebar-search" placeholder="搜索…" type="text">
    </div>
    <div id="sidebar-scroll"></div>
  </div>
  <div id="content-area">
    <div id="static-panel"></div>
    <div id="detail-view">
      <div class="detail-header">
        <button id="back-btn">← 返回</button>
        <div id="detail-title"></div>
        <div class="export-btns">
          <button class="exp-btn" id="exp-md">↓ Markdown</button>
          <button class="exp-btn pdf" id="exp-pdf">↓ PDF</button>
        </div>
      </div>
      <div class="search-bar">
        <input id="search-input" placeholder="在当前对话中搜索关键词…" type="text">
        <button class="sb-btn" id="search-btn">搜索</button>
        <button class="sb-nav" id="search-prev" disabled>↑</button>
        <button class="sb-nav" id="search-next" disabled>↓</button>
        <span id="search-count"></span>
      </div>
      <div class="messages-vp" id="vp"><div id="vc"></div></div>
    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div class="loading-msg" id="loading-msg">解析中…</div></div>
<div id="print-area"></div>

<script>
(function(){
'use strict';
if(typeof marked!=='undefined') marked.setOptions({breaks:true,gfm:true});

// ── State ──
let appData = {convs:[],projects:[],memories:null,account:null,globalMemory:null};
let filteredConvs=[], listDisplay=[];
let curConv=null, curMsgs=[];
let curTab='convs';
let curMemSection='global'; // which memory section is active in sidebar

// VS
const EST_H=130,SCAN=4;
let heights=[],offsets=[],totalH=0,rendered=new Map();

// Search
let srchQ='',srchHits=[],srchCur=-1;

// ── DOM ──
const $=id=>document.getElementById(id);
const uploadScreen=$('upload-screen'),mainScreen=$('main-screen'),detailView=$('detail-view');
const staticPanel=$('static-panel'),fileInput=$('file-input'),dropZone=$('drop-zone');
const sidebarScroll=$('sidebar-scroll'),shSub=$('sh-sub');
const sidebarSearch=$('sidebar-search'),tabs=document.querySelectorAll('.tab');
const detailTitle=$('detail-title');
const vp=$('vp'),vc=$('vc');
const searchInput=$('search-input'),searchBtn=$('search-btn');
const searchPrev=$('search-prev'),searchNext=$('search-next'),searchCount=$('search-count');
const loading=$('loading'),loadingMsg=$('loading-msg');

// ── Show/hide screens ──
function showMain(){uploadScreen.style.display='none';mainScreen.style.display='flex'}
function showUpload(){uploadScreen.style.display='flex';mainScreen.style.display='none'}
function showDetail(v){
  staticPanel.style.display=v?'none':'block';
  detailView.style.display=v?'flex':'none';
  if(!v)renderSidebarForTab();
}

// ── File input ──
fileInput.addEventListener('change',e=>{if(e.target.files.length)loadFiles(Array.from(e.target.files))});
// Prevent label click from bubbling up to dropZone (avoids double dialog)
document.getElementById('pick-label').addEventListener('click',e=>e.stopPropagation());
// dropZone click: only trigger if user clicks the zone itself (not the label/input)
dropZone.addEventListener('click',e=>{
  if(e.target===dropZone||e.target.classList.contains('drop-icon')||
     e.target.classList.contains('drop-label')||e.target.classList.contains('drop-hint')||
     e.target.classList.contains('tag')){
    fileInput.click();
  }
});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('over');
  if(e.dataTransfer.files.length)loadFiles(Array.from(e.dataTransfer.files))});
$('reset-btn').addEventListener('click',()=>{showUpload();fileInput.value='';resetState()});
$('back-btn').addEventListener('click',()=>{showDetail(false);clearSearch()});

function resetState(){appData={convs:[],projects:[],memories:null,account:null,globalMemory:null};
  filteredConvs=[];listDisplay=[];curConv=null;curMsgs=[];}

// ── Load files ──
async function loadFiles(files){
  showLoading('解析文件中…');
  try {
    for(const f of files){
      if(f.name.endsWith('.zip')||f.type==='application/zip'||f.type==='application/x-zip-compressed'){
        await parseZip(f);
      } else if(f.name.endsWith('.json')){
        const text=await readText(f);
        const data=JSON.parse(text);
        classifyJson(f.name,data);
      } else if(f.name.endsWith('.md')||f.name.endsWith('.markdown')||f.type==='text/markdown'){
        const text=await readText(f);
        classifyMd(f.name,text);
      }
    }
    finalizeData();
  } catch(err){
    hideLoading();
    alert('解析失败：'+err.message);
    console.error(err);
  }
}

async function parseZip(file){
  const zip=await JSZip.loadAsync(file);
  const files=Object.values(zip.files).filter(f=>!f.dir);
  loadingMsg.textContent='解析 ZIP 中（'+files.length+' 个文件）…';
  for(const zf of files){
    if(!zf.name.endsWith('.json'))continue;
    const text=await zf.async('string');
    let data;
    try{data=JSON.parse(text);}catch{continue;}
    const name=zf.name.split('/').pop();
    classifyJson(name,data,zf.name);
  }
}

function classifyJson(name,data,fullPath){
  if(name==='conversations.json'&&Array.isArray(data)){
    appData.convs=[...appData.convs,...data];
  } else if(name==='users.json'&&Array.isArray(data)){
    appData.account=data[0]||null;
  } else if(name==='memories.json'&&Array.isArray(data)){
    appData.memories=data[0]||null;
  } else if(fullPath&&fullPath.includes('projects/')&&name.match(/^[0-9a-f-]+\.json$/i)){
    if(typeof data==='object'&&data.uuid) appData.projects.push(data);
  } else if(name.match(/^[0-9a-f-]+\.json$/i)&&typeof data==='object'&&data.uuid&&data.name!==undefined&&data.prompt_template!==undefined){
    appData.projects.push(data);
  }
}

function classifyMd(filename,text){
  // Store with filename so user can import multiple .md files
  if(!appData.globalMemory) appData.globalMemory=[];
  appData.globalMemory.push({filename,text});
}

function readText(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=()=>rej(new Error('读取失败'));
    r.readAsText(file,'utf-8');
  });
}

function finalizeData(){
  // Deduplicate projects
  const seen=new Set();
  appData.projects=appData.projects.filter(p=>{if(seen.has(p.uuid))return false;seen.add(p.uuid);return true;});
  // Build conv list
  filteredConvs=appData.convs
    .filter(c=>hasContent(c))
    .map(c=>{
      const msgs=(c.chat_messages||[]).filter(m=>msgText(m).trim());
      return{uuid:c.uuid,name:c.name||c.summary||'（无标题对话）',
        msgCount:msgs.length,lastActive:c.updated_at||c.created_at||''};
    })
    .sort((a,b)=>new Date(b.lastActive)-new Date(a.lastActive));
  listDisplay=filteredConvs.slice();
  // Update sub header
  const parts=[];
  if(appData.convs.length) parts.push(filteredConvs.length+'条对话');
  if(appData.projects.length) parts.push(appData.projects.length+'个项目');
  if(appData.globalMemory&&appData.globalMemory.length) parts.push(appData.globalMemory.length+'个记忆文件');
  if(appData.account) parts.push(appData.account.full_name||appData.account.email_address||'');
  shSub.textContent=parts.join(' · ')||'—';
  // Switch active tab based on what we have
  setTab(appData.convs.length?'convs':appData.projects.length?'projects':appData.memories?'memories':'account');
  hideLoading();
  showMain();
  showDetail(false);
}

    .replace(/\n#{2} (.+)/g,'<h2>$1</h2>')

}

// ── Open conversation ──
function hasContent(c){return(c.chat_messages||[]).some(m=>msgText(m).trim().length>0)}
function msgText(m){if(m.text&&m.text.trim())return m.text;return(m.content||[]).map(b=>b.text||b.thinking||'').join('')}

function openConv(uuid){
  const raw=appData.convs.find(c=>c.uuid===uuid);
  if(!raw)return;
  curConv=raw;
  curMsgs=(raw.chat_messages||[]).filter(m=>msgText(m).trim().length>0);

  clearSearch();

// ── Virtual Scroll ──
function initVS(){
  const n=curMsgs.length;
  heights=new Array(n).fill(EST_H);
  offsets=new Array(n).fill(0);
  rendered.clear();vc.innerHTML='';
  recomputeOffsets();
  vc.style.height=totalH+'px';
  renderVisible();
}
function recomputeOffsets(){
  let off=0;
  for(let i=0;i<heights.length;i++){offsets[i]=off;off+=heights[i];}
  totalH=off;
}
function getRange(){
  const st=vp.scrollTop,vh=vp.clientHeight;
  let lo=0,hi=curMsgs.length-1,s=0;
  while(lo<=hi){const mid=(lo+hi)>>1;if(offsets[mid]+heights[mid]<st){lo=mid+1;s=lo;}else hi=mid-1;}
  s=Math.max(0,s-SCAN);
  let e=s;
  while(e<curMsgs.length&&offsets[e]<st+vh)e++;
  e=Math.min(curMsgs.length-1,e+SCAN);
  return[s,e];
}
function renderVisible(){
  if(!curMsgs.length)return;
  const[s,e]=getRange();
  for(const[i,node]of rendered){if(i<s||i>e){node.remove();rendered.delete(i);}}
  for(let i=s;i<=e;i++){
    if(!rendered.has(i)){
      const node=buildMsg(curMsgs[i],i);
      node.style.cssText=`position:absolute;top:${offsets[i]}px;left:0;right:0`;
      vc.appendChild(node);rendered.set(i,node);
      requestAnimationFrame(()=>{
        const n2=rendered.get(i);if(!n2)return;
        const h=n2.offsetHeight;
        if(h>0&&h!==heights[i]){heights[i]=h;recomputeOffsets();vc.style.height=totalH+'px';
          for(const[j,n]of rendered)n.style.top=offsets[j]+'px';}
      });
    }
  }
  if(srchQ)applyHL();
}
let rafPending=false;
vp.addEventListener('scroll',()=>{if(!rafPending){rafPending=true;requestAnimationFrame(()=>{renderVisible();rafPending=false;})}});

// ── Build message ──
function buildMsg(msg,idx){
  const isH=msg.sender==='human';
  const wrap=document.createElement('div');
  wrap.className='msg-wrap '+(isH?'human':'assistant');
  wrap.dataset.idx=idx;
  const inner=document.createElement('div');
  inner.className='msg-inner';
  // Meta
  const meta=document.createElement('div');
  meta.className='msg-meta';
  const sl=document.createElement('span');
  sl.className='sender-label '+(isH?'human':'assistant');
  sl.textContent=isH?'You':'Claude';
  const ts=document.createElement('span');
  ts.textContent=fmtFull(msg.created_at||'');
  if(isH){meta.appendChild(ts);meta.appendChild(sl);}
  else{meta.appendChild(sl);meta.appendChild(ts);}
  inner.appendChild(meta);
  // Thinking blocks
  if(!isH)(msg.content||[]).filter(b=>b.type==='thinking').forEach(b=>inner.appendChild(buildThinking(b)));
  // Text
  const textContent=(msg.content||[]).filter(b=>b.type==='text').map(b=>b.text||'').join('\n').trim()||msg.text||'';
  if(textContent.trim()){
    const bubble=document.createElement('div');
    bubble.className='bubble '+(isH?'human':'assistant');
    if(isH){bubble.innerHTML=esc(textContent).replace(/\n/g,'<br>');}
    else{try{bubble.innerHTML=marked.parse(textContent);}catch{bubble.textContent=textContent;}}
    inner.appendChild(bubble);
  }
  wrap.appendChild(inner);return wrap;
}

function buildThinking(b){
  const wrap=document.createElement('div');wrap.className='thinking-block';
  const toggle=document.createElement('div');toggle.className='thinking-toggle';
  const arrow=document.createElement('span');arrow.className='ti';arrow.textContent='▶';
  const label=document.createElement('span');label.style.fontWeight='500';label.textContent='思考过程';
  const sums=(b.summaries||[]).map(s=>s.summary).filter(Boolean).join('；');
  const sumEl=document.createElement('span');sumEl.className='thinking-sum';
  if(sums)sumEl.textContent='— '+sums;
  toggle.appendChild(arrow);toggle.appendChild(label);toggle.appendChild(sumEl);
  const body=document.createElement('div');body.className='thinking-body';body.textContent=b.thinking||'';
  toggle.addEventListener('click',()=>{const o=body.classList.toggle('open');toggle.classList.toggle('open',o);});
  wrap.appendChild(toggle);wrap.appendChild(body);return wrap;
}

// ── Search ──
searchBtn.addEventListener('click',doSearch);
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){if(srchHits.length)nextHit(1);else doSearch();}});
searchPrev.addEventListener('click',()=>nextHit(-1));
searchNext.addEventListener('click',()=>nextHit(1));

function doSearch(){
  removeHL();srchQ=searchInput.value.trim();srchHits=[];srchCur=-1;
  if(!srchQ){searchCount.textContent='';searchPrev.disabled=searchNext.disabled=true;return;}
  const q=srchQ.toLowerCase();
  curMsgs.forEach((m,i)=>{if(msgText(m).toLowerCase().includes(q))srchHits.push(i);});
  if(!srchHits.length){searchCount.textContent='无结果';searchPrev.disabled=searchNext.disabled=true;return;}
  searchPrev.disabled=searchNext.disabled=false;srchCur=0;scrollToHit(0);
}
function nextHit(d){if(!srchHits.length)return;srchCur=(srchCur+d+srchHits.length)%srchHits.length;scrollToHit(srchCur);}
function scrollToHit(i){
  const idx=srchHits[i];searchCount.textContent=`${i+1} / ${srchHits.length}`;
  vp.scrollTop=Math.max(0,offsets[idx]-80);renderVisible();setTimeout(applyHL,120);
}
function applyHL(){
  removeHL();if(!srchQ)return;
  const q=srchQ.toLowerCase(),curIdx=srchHits[srchCur];
  for(const[i,node]of rendered){
    node.querySelectorAll('.bubble,.thinking-body').forEach(el=>hlEl(el,q,i===curIdx));
  }
}
function hlEl(el,q,isCur){
  const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
  const tns=[];let n;while((n=walker.nextNode()))tns.push(n);
  tns.forEach(tn=>{
    const txt=tn.textContent,lo=txt.toLowerCase();
    if(!lo.includes(q))return;
    const frag=document.createDocumentFragment();
    let last=0,pos;
    while((pos=lo.indexOf(q,last))!==-1){
      if(pos>last)frag.appendChild(document.createTextNode(txt.slice(last,pos)));
      const mk=document.createElement('mark');mk.className='hl'+(isCur?' cur':'');
      mk.textContent=txt.slice(pos,pos+q.length);frag.appendChild(mk);last=pos+q.length;
    }
    if(last<txt.length)frag.appendChild(document.createTextNode(txt.slice(last)));
    tn.parentNode.replaceChild(frag,tn);tn.parentNode.normalize();
  });
}
function removeHL(){vc.querySelectorAll('mark.hl').forEach(m=>{m.parentNode.replaceChild(document.createTextNode(m.textContent),m);m.parentNode.normalize();});}
function clearSearch(){searchInput.value='';srchQ='';srchHits=[];srchCur=-1;searchCount.textContent='';searchPrev.disabled=searchNext.disabled=true;removeHL();}

// ── Export Markdown ──
$('exp-md').addEventListener('click',()=>{
  if(!curConv||!curMsgs.length)return;
  const title=curConv.name||curConv.summary||'conversation';
  let md=`# ${title}\n\n`;
  curMsgs.forEach(msg=>{
    const isH=msg.sender==='human';
    const sender=isH?'**You**':'**Claude**';
    const time=fmtFull(msg.created_at||'');
    const textContent=(msg.content||[]).filter(b=>b.type==='text').map(b=>b.text||'').join('\n').trim()||msg.text||'';
    const thinkings=(msg.content||[]).filter(b=>b.type==='thinking');
    md+=`### ${sender}  \`${time}\`\n\n`;
    if(thinkings.length){
      thinkings.forEach(t=>{
        const sum=(t.summaries||[]).map(s=>s.summary).join('；');
        md+=`<details>\n<summary>思考过程${sum?' — '+sum:''}</summary>\n\n${t.thinking||''}\n\n</details>\n\n`;
      });
    }
    md+=textContent+'\n\n---\n\n';
  });
  download(title.replace(/[\\/:*?"<>|]/g,'_').slice(0,60)+'.md',md,'text/markdown;charset=utf-8');
});

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"><\/script>
  <style>
  body{font-family:system-ui,sans-serif;font-size:14px;line-height:1.7;max-width:800px;margin:0 auto;padding:32px;color:#1a1a1a}
  h1{font-family:Georgia,serif;font-size:22px;margin-bottom:6px;color:#1a1a1a}
  .subtitle{color:#9c9590;font-size:12px;margin-bottom:32px}
  .msg{margin-bottom:22px;display:flex;flex-direction:column}
  .msg.human{align-items:flex-end}
  .msg.assistant{align-items:flex-start}
  .msg-head{font-size:11px;color:#9c9590;margin-bottom:4px}
  .bubble{padding:11px 15px;border-radius:14px;max-width:82%;word-break:break-word}
  .bubble.human{background:#f5e6d3;border-bottom-right-radius:3px}
  .bubble.assistant{background:#fff;border:1px solid #e4ddd6;border-bottom-left-radius:3px}
  .thinking{background:#f5f1ec;border:1px solid #ddd8d2;border-radius:10px;padding:8px 12px;margin-bottom:8px;max-width:82%;font-size:12px;color:#4a4543;font-style:italic}
  .thinking-label{font-weight:600;margin-bottom:4px;color:#9c9590;font-size:11px}
  pre{background:#1b1f27;color:#abb2bf;padding:11px;border-radius:8px;overflow-x:auto;font-size:12px}
  code{background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;font-size:12px}
  pre code{background:none}
  table{border-collapse:collapse;width:100%}th,td{border:1px solid #e8ddd3;padding:5px 9px}th{background:#f5e6d3}
  blockquote{border-left:3px solid #D97757;padding:3px 11px;color:#4a4543;font-style:italic}
  hr{border:none;border-top:1px solid #e8ddd3;margin:18px 0}
  @media print{body{max-width:100%}}
  <\/style></head><body>
  <h1>${esc(title)}</h1>
  <div class="subtitle">${curMsgs.length} 条消息 · 导出于 ${fmtFull(new Date().toISOString())}</div>`;

  curMsgs.forEach(msg=>{
    const isH=msg.sender==='human';
    const textContent=(msg.content||[]).filter(b=>b.type==='text').map(b=>b.text||'').join('\n').trim()||msg.text||'';
    const thinkings=(msg.content||[]).filter(b=>b.type==='thinking');
    html+=`<div class="msg ${isH?'human':'assistant'}">`;
    html+=`<div class="msg-head"><strong>${isH?'You':'Claude'}</strong> · ${fmtFull(msg.created_at||'')}</div>`;
    if(!isH&&thinkings.length){
      thinkings.forEach(t=>{
        const sum=(t.summaries||[]).map(s=>s.summary).join('；');
        html+=`<div class="thinking"><div class="thinking-label">思考过程${sum?' — '+sum:''}</div>${esc(t.thinking||'').slice(0,1000)}</div>`;
      });
    }
    if(textContent.trim()){
      if(isH){html+=`<div class="bubble human">${esc(textContent).replace(/\n/g,'<br>')}</div>`;}
      else{html+=`<div class="bubble assistant" id="md_${Math.random().toString(36).slice(2)}"><script>document.currentScript.previousElementSibling&&(document.currentScript.previousElementSibling.innerHTML=marked.parse(${JSON.stringify(textContent)}))<\/script>${esc(textContent)}</div>`;}
    }
    html+='</div>';
  });
  html+='</body></html>';

  const win=window.open('','_blank','width=900,height=700');
  if(!win){alert('请允许弹出窗口以导出PDF');return;}
  win.document.write(html);win.document.close();
  win.addEventListener('load',()=>{setTimeout(()=>win.print(),300);});
});

// ── Export global memory MD ──
function exportMemMd(idx){
  const m=appData.globalMemory&&appData.globalMemory[idx];
  if(!m)return;
  download(m.filename,m.text,'text/markdown;charset=utf-8');
}
window.exportMemMd=exportMemMd; // expose for inline onclick

// ── Helpers ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(iso){
  if(!iso)return'';
  try{const d=new Date(iso);return d.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});}catch{return iso;}
}
function fmtFull(iso){
  if(!iso)return'';
  try{const d=new Date(iso),p=n=>String(n).padStart(2,'0');
    return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
  catch{return iso;}
}
function download(filename,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename;a.click();URL.revokeObjectURL(a.href);
}
function showLoading(msg){loadingMsg.textContent=msg||'…';loading.classList.add('show');}
function hideLoading(){loading.classList.remove('show');}

})();
</script>
